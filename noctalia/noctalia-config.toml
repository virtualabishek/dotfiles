[audio]
enable_sounds = true

[bar.default]
capsule = true
center = [ "clock", "audio_visualizer" ]
margin_edge = 2
margin_ends = 9
thickness = 30
widget_spacing = 0

[battery]
warning_threshold = 35

[control_center.calendar]
show_events_card = false

[desktop_widgets]
schema_version = 2
widget_order = [ "desktop-widget-0000000000000001", "desktop-widget-0000000000000002" ]

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = false

    [desktop_widgets.widget.desktop-widget-0000000000000001]
    box_height = 0.0
    box_width = 0.0
    cx = 159.4453125
    cy = 995.9609375
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

    [desktop_widgets.widget.desktop-widget-0000000000000002]
    box_height = 0.0
    box_width = 0.0
    cx = 153.40625
    cy = 202.8203125
    output = "eDP-1"
    rotation = 0.0
    type = "sysmon"

        [desktop_widgets.widget.desktop-widget-0000000000000002.settings]
        stat = "cpu_usage"
        stat2 = "cpu_temp"

[dock]
auto_hide = true
cross_axis_padding = 0
enabled = true
icon_size = 30
launcher_position = "start"
reserve_space = false
show_dots = true

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600.0

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = true
    timeout = 900.0

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660.0

[lockscreen]
fingerprint = false

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@winit", "lockscreen-login-box@HDMI-A-1", "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@winit"]
    box_height = 70.0
    box_width = 400.0
    cx = 473.0
    cy = 943.0
    output = "winit"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@winit".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[plugin_settings."noctalia/screen_recorder"]
directory = "~/video/Recording"
resolution = "original"

[plugins]
enabled = [ "noctalia/screen_recorder" ]

[shell]
font_family = "JetBrainsMono Nerd Font Mono"
screen_time_enabled = true
settings_show_advanced = false

    [shell.panel]
    polkit_position = "top_left"

    [shell.screen_corners]
    enabled = true
    size = 19

    [shell.screenshot]
    directory = "~/pictures"

[theme]
builtin = "Tokyo-Night"
community_palette = "Monochrome"
mode = "dark"
source = "builtin"
wallpaper_scheme = "m3-content"

    [theme.templates]
    builtin_ids = [ "btop", "foot", "gtk3", "niri" ]

[wallpaper]
directory = "/home/abi/docs/wallpaper"

    [wallpaper.default]
    path = "/home/abi/docs/wallpaper/2-dusk-guardian.jpg"

    [wallpaper.last]
    path = "/home/abi/docs/wallpaper/2-dusk-guardian.jpg"

    [wallpaper.monitors.HDMI-A-1]
    path = "/home/abi/docs/wallpaper/2-dusk-guardian.jpg"

    [wallpaper.monitors.eDP-1]
    path = "/home/abi/docs/wallpaper/2-dusk-guardian.jpg"

[widget.wallpaper]
enabled = false
